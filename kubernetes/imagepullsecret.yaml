# ============================================================================
# KUBERNETES RESOURCE: Docker Registry Secret (imagePullSecrets)
# ============================================================================
#
# CONCEPT: What is an imagePullSecret?
#
# An imagePullSecret is a Kubernetes Secret that stores Docker registry
# credentials. When a Pod references this secret, kubelet (the Kubernetes
# agent on each node) uses it to authenticate with the container registry
# (GHCR in our case) before pulling the image.
#
# WHY IT EXISTS:
# - Private registries require authentication to pull images
# - Without it, you get: "ImagePullBackOff" or "ErrImagePull" errors
# - It's the Kubernetes equivalent of: docker login ghcr.io
#
# HOW IT WORKS:
# 1. You create a Personal Access Token (PAT) on GitHub
# 2. You create a Kubernetes Secret of type "docker-registry"
# 3. You reference this secret in your Pod spec as "imagePullSecrets"
# 4. When creating a Pod, kubelet reads the secret and authenticates with GHCR
#
# ⚠️  IMPORTANT: Do NOT put real credentials in this file!
# ⚠️  This is a TEMPLATE with placeholders.
# ⚠️  Use the kubectl command below instead (it creates the secret directly).
# ============================================================================

# ---------------------------------------------------------------------------
# STEP 1: Create a GitHub Personal Access Token (PAT)
# ---------------------------------------------------------------------------
#
# 1. Go to GitHub → Settings → Developer settings → Personal access tokens
#    → Tokens (classic) or Fine-grained tokens
# 2. Click "Generate new token (classic)"
# 3. Give it a descriptive name: "task-manager-k8s"
# 4. Set expiration (recommend: 90 days, but longer for learning)
# 5. Select scopes:
#    - read:packages (to pull images from GHCR)
#    - write:packages (to push images to GHCR — needed by docker push)
# 6. Generate and COPY the token immediately (you won't see it again!)
#
# ---------------------------------------------------------------------------
# STEP 2: Create the imagePullSecret
# ---------------------------------------------------------------------------
#
# Run this command (replace placeholders):
#
#   kubectl create secret docker-registry ghcr-secret \
#     --namespace=task-manager \
#     --docker-server=ghcr.io \
#     --docker-username=YOUR_GITHUB_USERNAME \
#     --docker-password=YOUR_GITHUB_PAT \
#     --docker-email=YOUR_GITHUB_EMAIL
#
# PARAMETERS EXPLAINED:
#   --docker-server:  Registry server URL (ghcr.io)
#   --docker-username: Your GitHub username (not email!)
#   --docker-password: The Personal Access Token (NOT your GitHub password!)
#   --docker-email:   Your GitHub account email
#
# EXAMPLE:
#   kubectl create secret docker-registry ghcr-secret \
#     --namespace=task-manager \
#     --docker-server=ghcr.io \
#     --docker-username=maruf \
#     --docker-password=ghp_xxxxxxxxxxxxxxxxxxxx \
#     --docker-email=maruf@example.com
#
# ---------------------------------------------------------------------------
# STEP 3: Verify the secret was created
# ---------------------------------------------------------------------------
#
#   kubectl get secret ghcr-secret --namespace=task-manager
#   kubectl describe secret ghcr-secret --namespace=task-manager
#
# ---------------------------------------------------------------------------
# ALTERNATIVE: Create from a YAML manifest (manual method)
# ---------------------------------------------------------------------------
#
# If you prefer to create the secret from a YAML file, follow these steps:
#
# 1. Base64-encode your credentials:
#
#    PowerShell:
#    $server = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("ghcr.io"))
#    $username = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("YOUR_USERNAME"))
#    $password = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("YOUR_PAT"))
#    $email = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("YOUR_EMAIL"))
#    Write-Output $server; Write-Output $username; Write-Output $password; Write-Output $email
#
#    Linux/macOS:
#    echo -n "ghcr.io" | base64
#    echo -n "YOUR_USERNAME" | base64
#    echo -n "YOUR_PAT" | base64
#    echo -n "YOUR_EMAIL" | base64
#
# 2. Copy the base64 values into the data section below
# 3. Apply: kubectl apply -f kubernetes/imagepullsecret.yaml
#
# ⚠️  WARNING: NEVER commit a file with real base64-encoded credentials!
# ⚠️  Base64 is encoding, NOT encryption. Anyone can decode it.
# ⚠️  Add kubernetes/imagepullsecret.yaml to .gitignore after filling it!
# ============================================================================

# Uncomment and fill this section if using manual method:
# ---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: ghcr-secret
#   namespace: task-manager
#   labels:
#     app: task-manager
# type: kubernetes.io/dockerconfigjson  # <-- Special type for Docker registry creds
# data:
#   # .dockerconfigjson contains a base64-encoded Docker config.json
#   .dockerconfigjson: <BASE64_ENCODED_DOCKER_CONFIG_JSON>
#
# The .dockerconfigjson value is a base64-encoded JSON like:
# {
#   "auths": {
#     "ghcr.io": {
#       "username": "YOUR_USERNAME",
#       "password": "YOUR_PAT",
#       "email": "YOUR_EMAIL",
#       "auth": "<base64 of username:password>"
#     }
#   }
# }
