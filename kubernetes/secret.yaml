# ============================================================================
# KUBERNETES RESOURCE: Secret
# ============================================================================
#
# CONCEPT: What is a Secret?
#
# A Secret stores sensitive data such as passwords, OAuth tokens, SSH keys.
# It's similar to a ConfigMap but designed for confidential information.
#
# WHY IT EXISTS:
# - NEVER store passwords, tokens, or keys in ConfigMaps
# - NEVER hardcode secrets in your Docker image or source code
# - Secrets are base64-encoded at rest (NOT encrypted by default!)
# - In production, integrate with a key management system (Vault, AWS KMS, etc.)
#
# IMPORTANT SECURITY NOTES:
# 1. Kubernetes Secrets are only base64-encoded, NOT encrypted.
#    Anyone with kubectl access to the namespace can decode them.
# 2. For production, use:
#    - RBAC to restrict Secret access
#    - Encryption at rest (encryption-provider-config)
#    - External secret management (Sealed Secrets, Vault, AWS Secrets Manager)
# 3. We'll expand this when adding MongoDB, Redis, RabbitMQ
#
# CURRENT STATE:
# We don't have sensitive data yet (no database passwords).
# This file is intentionally minimal — it's a placeholder for GHCR credentials
# and future database passwords.
# ============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: task-manager-secret
  namespace: task-manager
  labels:
    app: task-manager
type: Opaque # "Opaque" means arbitrary key-value pairs (most common type)
data:
  # Values MUST be base64-encoded. To create:
  #   echo -n "your-value" | base64
  #
  # Currently empty placeholder. Will populate with:
  # - GitHub Container Registry credentials (Topic 3)
  # - MongoDB password (when we add MongoDB)
  # - Redis password (when we add Redis)
  # - RabbitMQ credentials (when we add RabbitMQ)

  # Example placeholder (empty value, base64-encoded):
  # placeholder: cGxhY2Vob2xkZXI=

# ---------------------------------------------------------------------------
# HOW TO GENERATE BASE64 VALUES:
#
# Linux/macOS:
#   echo -n "my-password" | base64
#
# Windows PowerShell:
#   [Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes("my-password"))
#
# Then paste the base64 string into this file.
# NEVER commit the decoded value in plaintext!
# ---------------------------------------------------------------------------
